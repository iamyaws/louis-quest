  async get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null}catch(e){return null}},

};

      {shape==="cube"&&<rect x="55" y="100" width="90" height="90" rx="18" fill={color}/>}
      {shape==="circle"&&<ellipse cx="100" cy="145" rx="48" ry="48" fill={color}/>}

// ── Celebration ──
function Celebration({active,onDone}){
  const[p,setP]=useState([]);
  useEffect(()=>{if(!active)return;setP(Array.from({length:24},(_,i)=>({id:i,x:50+(Math.random()-.5)*70,y:50+(Math.random()-.5)*70,color:[T.accent,"#F472B6",T.success,"#60A5FA",T.primaryLight,T.accentDark][i%6],size:6+Math.random()*12,delay:Math.random()*.4})));const t=setTimeout(()=>{setP([]);onDone?.();},2000);return()=>clearTimeout(t);},[active]);
  if(!p.length)return null;
  return(<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>{p.map(pt=><div key={pt.id} style={{position:"absolute",left:`${pt.x}%`,top:`${pt.y}%`,width:pt.size,height:pt.size,backgroundColor:pt.color,borderRadius:"50%",animation:`celebPop 1.8s ease-out ${pt.delay}s forwards`,opacity:0}}/>)}<div style={{fontSize:"3rem",animation:"celebText 1.8s ease-out forwards",zIndex:10}}>⭐ Super!</div></div>);
}

// ── Progress Ring ──
function ProgressRing({progress,size,stroke,color}){
  const r=(size-stroke)/2;const circ=2*Math.PI*r;const off=circ-(progress*circ);
  return(<svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(0,0,0,0.06)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off} style={{transition:"stroke-dashoffset 0.8s ease"}}/></svg>);
}

// ── Sky Gradient based on progress ──
function getSky(done,total){
  const p=total>0?done/total:0;
  if(p>=1) return "linear-gradient(180deg, #0F172A 0%, #1E1B4B 40%, #312E81 100%)"; // night
  if(p>=0.66) return "linear-gradient(180deg, #FDE68A 0%, #FB923C 30%, #F97316 60%, #7C3AED 100%)"; // sunset
  if(p>=0.33) return "linear-gradient(180deg, #7DD3FC 0%, #38BDF8 40%, #0EA5E9 100%)"; // day
  return "linear-gradient(180deg, #FEFCE8 0%, #FDE68A 30%, #FCD34D 60%, #FB923C 100%)"; // dawn
}
function getSkyStars(done,total){return total>0&&done/total>=1;}
function getTimeLabel(done,total){const p=total>0?done/total:0;if(p>=1)return"Nacht 🌙";if(p>=0.66)return"Abend 🌅";if(p>=0.33)return"Tag ☀️";return"Morgen 🌅";}


// ── Onboarding ──
function Onboarding({onComplete}){
  const[step,setStep]=useState(0); // 0=welcome,1=shape,2=color,3=eyes,4=hair,5=name,6=catquiz1,7=catquiz2,8=catpick,9=catname,10=activate
  const[hero,setHero]=useState({shape:"cube",color:HERO_COLORS[0],eyes:"round",hair:"short",name:""});
  const[catAnswers,setCatAnswers]=useState({});
  const[selCat,setSelCat]=useState(null);
  const[catName,setCatName]=useState("");

  const getSugg=()=>{const c=catAnswers.color,p=catAnswers.power;if(c==="orange"||p==="fire")return"tiger";if(c==="grey"||p==="invisible")return"shadow";if(c==="white"||p==="ice")return"snow";if(c==="purple"||p==="speed")return"galaxy";return"golden";};

  const totalSteps=11;
  const Dot=()=><div style={{display:"flex",gap:5,marginBottom:24,justifyContent:"center"}}>{Array.from({length:totalSteps},(_,i)=><div key={i} style={{width:i===step?20:7,height:7,borderRadius:4,background:i<step?T.success:i===step?T.primary:"rgba(0,0,0,0.08)",transition:"all .3s"}}/>)}</div>;

  const Wrap=({children})=><div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Nunito',sans-serif",color:T.textPrimary,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,paddingTop:"env(safe-area-inset-top, 24px)"}}><Dot/>{children}</div>;

  const Title=({children})=><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1.5rem",fontWeight:800,color:T.primary,textAlign:"center",marginBottom:8,textTransform:"uppercase",fontStyle:"italic",letterSpacing:"-0.02em"}}>{children}</div>;

  const Sub=({children})=><div style={{fontSize:".85rem",color:T.textSecondary,textAlign:"center",marginBottom:24}}>{children}</div>;

  const Btn=({children,onClick,disabled,big})=><button onClick={onClick} disabled={disabled} style={{background:disabled?"rgba(0,0,0,0.06)":`linear-gradient(135deg,${T.primary},${T.primaryLight})`,border:"none",borderRadius:50,padding:big?"16px 48px":"12px 32px",color:disabled?T.textLight:"white",fontWeight:800,fontSize:big?"1.1rem":".9rem",cursor:disabled?"default":"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",textTransform:"uppercase",letterSpacing:".05em",boxShadow:disabled?"none":`0 8px 24px ${T.primary}40`,opacity:disabled?.5:1,transition:"all .2s"}}>{children}</button>;

  const Grid=({children,cols})=><div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:10,width:"100%",maxWidth:340}}>{children}</div>;

  const Chip=({selected,onClick,children,big})=><button onClick={onClick} style={{background:selected?"rgba(109,40,217,0.1)":"white",border:selected?`2.5px solid ${T.primary}`:"2px solid rgba(0,0,0,0.08)",borderRadius:16,padding:big?"16px":"12px",cursor:"pointer",transition:"all .15s",fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:".85rem",color:T.textPrimary,textAlign:"center",boxShadow:selected?`0 4px 16px ${T.primary}20`:"0 2px 8px rgba(0,0,0,0.04)"}}>{children}</button>;

  // Step 0: Welcome
  if(step===0) return <Wrap><div style={{fontSize:"4rem",marginBottom:16,animation:"heroFloat 3s ease-in-out infinite"}}>🦸</div><Title>Willkommen bei HeroDex!</Title><Sub>Erstelle deinen Helden und starte dein Abenteuer!</Sub><Btn onClick={()=>setStep(1)} big>Los geht's! 🚀</Btn></Wrap>;

  // Step 1: Shape
  if(step===1) return <Wrap><Title>Wähle deine Form</Title><Sub>Wie soll dein Held aussehen?</Sub><div style={{marginBottom:24}}><HeroSprite shape={hero.shape} color={hero.color} eyes={hero.eyes} hair={hero.hair} size={120} level={1}/></div><Grid cols={4}>{HERO_SHAPES.map(s=><Chip key={s} selected={hero.shape===s} onClick={()=>setHero(h=>({...h,shape:s}))}>{s==="cube"?"🟧":s==="circle"?"🔵":s==="hex"?"⬡":"💊"}<div style={{fontSize:".6rem",marginTop:4}}>{s==="cube"?"Würfel":s==="circle"?"Kreis":s==="hex"?"Hexagon":"Pille"}</div></Chip>)}</Grid><div style={{marginTop:20}}><Btn onClick={()=>setStep(2)}>Weiter →</Btn></div></Wrap>;

  // Step 2: Color
  if(step===2) return <Wrap><Title>Wähle deine Farbe</Title><div style={{marginBottom:24}}><HeroSprite shape={hero.shape} color={hero.color} eyes={hero.eyes} hair={hero.hair} size={120} level={1}/></div><Grid cols={4}>{HERO_COLORS.map(c=><button key={c} onClick={()=>setHero(h=>({...h,color:c}))} style={{width:52,height:52,borderRadius:16,background:c,border:hero.color===c?`3px solid ${T.textPrimary}`:"3px solid transparent",cursor:"pointer",boxShadow:hero.color===c?`0 4px 16px ${c}60`:"0 2px 8px rgba(0,0,0,0.08)",transition:"all .15s",margin:"0 auto"}}/>)}</Grid><div style={{marginTop:20}}><Btn onClick={()=>setStep(3)}>Weiter →</Btn></div></Wrap>;

  // Step 3: Eyes
  if(step===3) return <Wrap><Title>Wähle deine Augen</Title><div style={{marginBottom:24}}><HeroSprite shape={hero.shape} color={hero.color} eyes={hero.eyes} hair={hero.hair} size={120} level={1}/></div><Grid cols={4}>{HERO_EYES.map(e=><Chip key={e} selected={hero.eyes===e} onClick={()=>setHero(h=>({...h,eyes:e}))}>{e==="round"?"👀":e==="happy"?"😊":e==="cool"?"😎":"🥺"}<div style={{fontSize:".6rem",marginTop:4}}>{e==="round"?"Rund":e==="happy"?"Fröhlich":e==="cool"?"Cool":"Groß"}</div></Chip>)}</Grid><div style={{marginTop:20}}><Btn onClick={()=>setStep(4)}>Weiter →</Btn></div></Wrap>;

  // Step 4: Hair
  if(step===4) return <Wrap><Title>Wähle deine Frisur</Title><div style={{marginBottom:24}}><HeroSprite shape={hero.shape} color={hero.color} eyes={hero.eyes} hair={hero.hair} size={120} level={1}/></div><Grid cols={3}>{HERO_HAIRS.map(h2=><Chip key={h2} selected={hero.hair===h2} onClick={()=>setHero(h=>({...h,hair:h2}))}>{h2==="short"?"✂️":h2==="spiky"?"⚡":h2==="curly"?"🌀":h2==="long"?"💇":h2==="cap"?"🧢":"🚫"}<div style={{fontSize:".6rem",marginTop:4}}>{h2==="short"?"Kurz":h2==="spiky"?"Stachelig":h2==="curly"?"Lockig":h2==="long"?"Lang":h2==="cap"?"Kappe":"Keine"}</div></Chip>)}</Grid><div style={{marginTop:20}}><Btn onClick={()=>setStep(5)}>Weiter →</Btn></div></Wrap>;

  // Step 5: Hero Name
  if(step===5) return <Wrap><Title>Wie heißt dein Held?</Title><div style={{marginBottom:20}}><HeroSprite shape={hero.shape} color={hero.color} eyes={hero.eyes} hair={hero.hair} size={130} level={1}/></div><input value={hero.name} onChange={e=>setHero(h=>({...h,name:e.target.value}))} placeholder="Dein Heldenname..." style={{width:"100%",maxWidth:300,background:"white",border:`2px solid ${hero.name.trim()?T.primary:"rgba(0,0,0,0.1)"}`,borderRadius:16,padding:"14px 20px",color:T.textPrimary,fontSize:"1.1rem",fontFamily:"'Plus Jakarta Sans',sans-serif",textAlign:"center",outline:"none",fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,0.06)"}}/><div style={{marginTop:20}}><Btn onClick={()=>setStep(6)} disabled={!hero.name.trim()}>Weiter →</Btn></div></Wrap>;

  // Step 6: Cat quiz - color
  if(step===6) return <Wrap><Title>Jetzt dein Sidekick! 🐱</Title><Sub>Welche Farbe magst du?</Sub><Grid cols={3}>{[{l:"🧡 Orange",v:"orange"},{l:"🩶 Silber",v:"grey"},{l:"🤍 Weiß",v:"white"},{l:"💜 Lila",v:"purple"},{l:"💛 Gold",v:"gold"}].map(o=><Chip key={o.v} selected={catAnswers.color===o.v} onClick={()=>{setCatAnswers(a=>({...a,color:o.v}));setTimeout(()=>setStep(7),250);}}>{o.l}</Chip>)}</Grid></Wrap>;

  // Step 7: Cat quiz - power
  if(step===7) return <Wrap><Title>Welche Superkraft?</Title><Grid cols={2}>{[{l:"⚡ Superschnell",v:"speed"},{l:"🌟 Unsichtbar",v:"invisible"},{l:"🔥 Feuer",v:"fire"},{l:"❄️ Eis & Schnee",v:"ice"}].map(o=><Chip key={o.v} big selected={catAnswers.power===o.v} onClick={()=>{setCatAnswers(a=>({...a,power:o.v}));setTimeout(()=>setStep(8),250);}}>{o.l}</Chip>)}</Grid></Wrap>;

  // Step 8: Cat pick
  const sugg=getSugg();
  if(step===8) return <Wrap><Title>Wähle deine Katze!</Title><Sub>Empfehlung: <span style={{color:T.accent,fontWeight:800}}>{CAT_VARIANTS[sugg]?.name}</span> ✨</Sub><Grid cols={3}>{Object.entries(CAT_VARIANTS).map(([k,cv])=><Chip key={k} selected={selCat===k} onClick={()=>setSelCat(k)}><div style={{display:"flex",justifyContent:"center"}}><CatSidekick variant={k} mood="happy" size={48}/></div><div style={{fontSize:".6rem",fontWeight:800,marginTop:4}}>{cv.name}</div></Chip>)}</Grid>{selCat&&<><div style={{fontSize:".8rem",color:T.primaryLight,marginTop:12,textAlign:"center"}}>{CAT_VARIANTS[selCat].desc}</div><div style={{marginTop:16}}><Btn onClick={()=>setStep(9)}>Weiter →</Btn></div></>}</Wrap>;

  // Step 9: Cat name
  if(step===9) return <Wrap><Title>Name deiner Katze?</Title><div style={{marginBottom:16}}><CatSidekick variant={selCat||sugg} mood="excited" size={80}/></div><input value={catName} onChange={e=>setCatName(e.target.value)} placeholder="Katzenname..." style={{width:"100%",maxWidth:300,background:"white",border:`2px solid ${catName.trim()?T.primary:"rgba(0,0,0,0.1)"}`,borderRadius:16,padding:"14px 20px",color:T.textPrimary,fontSize:"1.1rem",fontFamily:"'Plus Jakarta Sans',sans-serif",textAlign:"center",outline:"none",fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,0.06)"}}/><div style={{marginTop:20}}><Btn onClick={()=>setStep(10)} disabled={!catName.trim()}>Weiter →</Btn></div></Wrap>;

  // Step 10: Activation
  if(step===10) return <Wrap><div style={{marginBottom:8,display:"flex",alignItems:"flex-end",gap:8,justifyContent:"center"}}><HeroSprite shape={hero.shape} color={hero.color} eyes={hero.eyes} hair={hero.hair} size={120} level={1}/><div style={{animation:"heroFloat 2.5s ease-in-out infinite",animationDelay:".5s"}}><CatSidekick variant={selCat||sugg} mood="excited" size={56}/></div></div><Title>HeroDex aktiviert!</Title><Sub>{hero.name} & {catName} sind bereit!</Sub><Btn onClick={()=>onComplete({hero:{...hero},catVariant:selCat||sugg,catName})} big>Abenteuer starten! 🦸🐱</Btn></Wrap>;

  return null;
}


// ── Main App ──
function HeroDex(){
  const[state,setState]=useState(null);
  const[boarding,setBoarding]=useState(null);
  const[view,setView]=useState("hub");
  const[questOpen,setQuestOpen]=useState(false);
  const[celeb,setCeleb]=useState(false);
  const[pMode,setPMode]=useState(false);
  const[pinShow,setPinShow]=useState(false);
  const[pin,setPin]=useState("");
  const[shopOpen,setShopOpen]=useState(false);
  const[nq,setNq]=useState({name:"",icon:"⭐",anchor:"morning",xp:15,minutes:5});

  useEffect(()=>{(async()=>{try{const s=await window.storage.get("hdx1");if(s?.value){const p=JSON.parse(s.value);const today=new Date().toDateString();if(p.lastDate!==today){p.quests=buildDay(p.vacMode).map(q=>({...q,streak:(p.sm||{})[q.id]||0}));p.lastDate=today;p.dt=0;}setState(p);setBoarding(false);return;}}catch(e){}setBoarding(true);})();},[]);
  useEffect(()=>{if(state)try{window.storage.set("hdx1",JSON.stringify(state));}catch(e){}},[state]);

  const onBoard=({hero,catVariant,catName})=>{setState({hero,catVariant,catName,xp:0,coins:0,quests:buildDay(false),rewards:REWARDS,acc:[],sd:0,lastDate:new Date().toDateString(),dt:0,hist:[],vacMode:false,sm:{},roomItems:[]});setBoarding(false);};

  const complete=useCallback(id=>{setState(prev=>{const q=prev.quests.find(x=>x.id===id);if(!q||q.done)return prev;setCeleb(true);const nq2=prev.quests.map(x=>x.id===id?{...x,done:true,streak:x.streak+1}:x);const all=nq2.every(x=>x.done);const sm={...prev.sm,[id]:(prev.sm[id]||0)+1};return{...prev,quests:nq2,xp:prev.xp+q.xp+(all?30:0),coins:prev.coins+Math.floor(q.xp/3)+(all?15:0),dt:prev.dt+q.minutes,sd:all?prev.sd+1:prev.sd,hist:[...prev.hist,{id,d:Date.now()}],sm};});},[]);

  const addQuest=()=>{if(!nq.name.trim())return;setState(p=>({...p,quests:[...p.quests,{id:"c_"+Date.now(),name:nq.name.trim(),icon:nq.icon,anchor:nq.anchor,xp:nq.xp,minutes:nq.minutes,done:false,streak:0}]}));setNq(n=>({...n,name:""}));};
  const rmQuest=id=>setState(p=>({...p,quests:p.quests.filter(q=>q.id!==id)}));
  const togVac=()=>setState(p=>{const nv=!p.vacMode;return{...p,vacMode:nv,quests:buildDay(nv).map(q=>({...q,streak:(p.sm||{})[q.id]||0})),dt:0};});
  const resetDay=()=>setState(p=>({...p,quests:p.quests.map(q=>({...q,done:false})),dt:0,lastDate:new Date().toDateString()}));
  const resetAll=()=>{try{window.storage.delete("hdx1");}catch(e){}setState(null);setBoarding(true);};

  if(boarding===null)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,color:T.textPrimary,fontFamily:"'Nunito',sans-serif"}}>Laden...</div>;
  if(boarding)return<Onboarding onComplete={onBoard}/>;
  if(!state)return null;

  const level=getLevel(state.xp);const xpP=getLvlProg(state.xp);
  const done=state.quests.filter(q=>q.done).length;const total=state.quests.length;const allDone=done===total&&total>0;
  const pct=total>0?done/total:0;
  const mood=allDone?"excited":pct>0.5?"happy":pct>0?"neutral":"sleepy";
  const dayN=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"][new Date().getDay()];
  const byA={};state.quests.forEach(q=>{if(!byA[q.anchor])byA[q.anchor]=[];byA[q.anchor].push(q);});

  const BADGES=[
    {i:"🌟",n:"Erster Tag",u:state.xp>0},{i:"🔥",n:"3-Tage",u:state.sd>=3},{i:"⚡",n:"7-Tage",u:state.sd>=7},
    {i:"👑",n:"Level 5",u:level>=5},{i:"🎯",n:"50 Quests",u:state.hist.length>=50},{i:"💎",n:"Level 10",u:level>=10},
    {i:"🏰",n:"30 Tage",u:state.sd>=30},{i:"🐉",n:"100 Quests",u:state.hist.length>=100},{i:"🐱",n:"Sammler",u:state.acc.length>0},
  ];

  // Shared styles
  const pillBtn=(active,col)=>({background:active?`${col}15`:"white",border:active?`2px solid ${col}`:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"8px 16px",fontWeight:800,fontSize:".72rem",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",color:active?col:T.textSecondary,textTransform:"uppercase",letterSpacing:".04em",transition:"all .15s",boxShadow:active?`0 4px 12px ${col}20`:"none"});

  return(
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        @keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes catIdle{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-3px) rotate(-2deg)}75%{transform:translateY(-3px) rotate(2deg)}}
        @keyframes celebPop{0%{transform:scale(0) translateY(0);opacity:1}50%{opacity:1}100%{transform:scale(1.5) translateY(-200px) rotate(360deg);opacity:0}}
        @keyframes celebText{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:0}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
        @keyframes starTwinkle{0%,100%{opacity:.3}50%{opacity:1}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
      `}</style>

      <Celebration active={celeb} onDone={()=>setCeleb(false)}/>

      {/* PIN Modal */}
      {pinShow&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .2s ease"}} onClick={()=>{setPinShow(false);setPin("");}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:28,padding:28,textAlign:"center",boxShadow:"0 24px 64px rgba(0,0,0,0.15)",minWidth:280}}>
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,marginBottom:16,color:T.textPrimary}}>Eltern-PIN</div>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>{[0,1,2,3].map(i=><div key={i} style={{width:44,height:52,borderRadius:14,background:T.bg,border:"2px solid rgba(0,0,0,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem",fontWeight:800,color:T.primary}}>{pin[i]?"●":""}</div>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:200,margin:"0 auto"}}>{[1,2,3,4,5,6,7,8,9,null,0,"⌫"].map((n,i)=><button key={i} onClick={()=>{if(n===null)return;if(n==="⌫"){setPin(p=>p.slice(0,-1));return;}const nx=pin+n;setPin(nx);if(nx.length===4){if(nx==="1234"){setPMode(true);setPinShow(false);}setPin("");}}} style={{background:n===null?"transparent":T.bg,border:"none",borderRadius:12,padding:"12px 0",color:T.textPrimary,fontSize:"1.2rem",fontWeight:800,cursor:n===null?"default":"pointer",visibility:n===null?"hidden":"visible"}}>{n}</button>)}</div>
        </div>
      </div>}

      <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Nunito',sans-serif",color:T.textPrimary}}>

        {/* ═══ HUB VIEW ═══ */}
        {view==="hub"&&<div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          {/* Sky */}
          <div style={{background:getSky(done,total),borderRadius:"0 0 32px 32px",padding:"env(safe-area-inset-top, 12px) 20px 32px",position:"relative",overflow:"hidden",minHeight:380,display:"flex",flexDirection:"column"}}>
            {/* Stars for night */}
            {getSkyStars(done,total)&&<>{Array.from({length:12},(_,i)=><div key={i} style={{position:"absolute",width:3,height:3,borderRadius:"50%",background:"white",top:`${10+Math.random()*40}%`,left:`${5+Math.random()*90}%`,animation:`starTwinkle ${1.5+Math.random()*2}s ease-in-out infinite`,animationDelay:`${Math.random()*2}s`}}/>)}</>}

            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,marginBottom:8}}>
              <div>
                <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1.3rem",fontWeight:900,color:"white",textTransform:"uppercase",fontStyle:"italic",letterSpacing:"-0.02em",textShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>HeroDex</div>
                <div style={{fontSize:".7rem",color:"rgba(255,255,255,0.7)",fontWeight:600}}>{dayN} {state.vacMode?"🏖️ Ferien":""}</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <div style={{background:"rgba(255,255,255,0.2)",backdropFilter:"blur(10px)",borderRadius:50,padding:"4px 12px",fontSize:".75rem",fontWeight:800,color:"white",display:"flex",alignItems:"center",gap:3}}>🪙 {state.coins}</div>
                <div style={{background:"rgba(255,255,255,0.2)",backdropFilter:"blur(10px)",borderRadius:50,padding:"4px 12px",fontSize:".75rem",fontWeight:800,color:"white"}}>Lvl {level}</div>
                <button onClick={()=>pMode?setPMode(false):setPinShow(true)} style={{background:pMode?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.15)",border:"none",borderRadius:50,padding:"4px 10px",cursor:"pointer",color:"white",fontSize:".7rem",fontWeight:700}}>{pMode?"🔓":"🔒"}</button>
              </div>
            </div>

            {/* XP Bar */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:".6rem",color:"rgba(255,255,255,0.6)",marginBottom:3}}><span>Level {level}</span><span>{xpP.cur}/{xpP.need} XP</span></div>
              <div style={{background:"rgba(255,255,255,0.15)",borderRadius:50,height:8,overflow:"hidden"}}><div style={{height:"100%",borderRadius:50,width:`${Math.min(100,(xpP.cur/xpP.need)*100)}%`,background:"linear-gradient(90deg, #FCD34D, #F59E0B)",transition:"width .8s ease"}}/></div>
            </div>

            {/* Hero + Cat + Progress Ring */}
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              <div style={{position:"relative"}}>
                {/* Progress Ring behind hero */}
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}><ProgressRing progress={pct} size={200} stroke={6} color={allDone?"#34D399":"rgba(255,255,255,0.4)"}/></div>
                {/* Hero */}
                <div style={{animation:"heroFloat 3s ease-in-out infinite",cursor:"pointer",position:"relative",zIndex:2}} onClick={()=>setQuestOpen(true)}>
                  <HeroSprite shape={state.hero.shape} color={state.hero.color} eyes={state.hero.eyes} hair={state.hero.hair} size={140} level={level}/>
                </div>
                {/* Cat sidekick */}
                <div style={{position:"absolute",bottom:-10,right:-40,animation:"catIdle 4s ease-in-out infinite",zIndex:3}}>
                  <CatSidekick variant={state.catVariant} mood={mood} size={56}/>
                </div>
              </div>
            </div>

            {/* Time & Status */}
            <div style={{textAlign:"center",paddingBottom:8}}>
              <div style={{fontSize:".75rem",color:"rgba(255,255,255,0.7)",fontWeight:600}}>{getTimeLabel(done,total)}</div>
              <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.1rem",fontWeight:700,color:"white"}}>{done}/{total} Quests {allDone?"🎉":""}</div>
              <div style={{fontSize:".7rem",color:"rgba(255,255,255,0.6)",marginTop:2}}>+{state.dt} Min verdient</div>
            </div>
          </div>

          {/* Tap to open quests hint */}
          {!questOpen&&<div style={{textAlign:"center",padding:"16px 0 8px"}}>
            <button onClick={()=>setQuestOpen(true)} style={{background:`linear-gradient(135deg,${T.primary},${T.primaryLight})`,border:"none",borderRadius:50,padding:"14px 36px",color:"white",fontWeight:800,fontSize:".9rem",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",textTransform:"uppercase",letterSpacing:".05em",boxShadow:`0 8px 24px ${T.primary}40`}}>⚔️ Quests öffnen</button>
          </div>}

          {/* Quick nav to other views */}
          <div style={{display:"flex",gap:6,padding:"8px 20px 20px",justifyContent:"center"}}>
            {[{id:"time",l:"Zeitbank",i:"⏰"},{id:"stats",l:"Erfolge",i:"🏆"}].map(t=><button key={t.id} onClick={()=>setView(t.id)} style={pillBtn(false,T.primary)}>{t.i} {t.l}</button>)}
          </div>
        </div>}

        {/* ═══ QUEST BOARD (overlay) ═══ */}
        {questOpen&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column"}}>
          <div style={{flex:"0 0 auto",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(4px)"}} onClick={()=>setQuestOpen(false)}/>
          <div style={{flex:"1 1 auto",background:"white",borderRadius:"28px 28px 0 0",padding:"20px 20px 100px",overflow:"auto",animation:"slideUp .3s ease",boxShadow:"0 -8px 40px rgba(0,0,0,0.1)"}}>
            {/* Handle */}
            <div style={{width:40,height:4,borderRadius:2,background:"rgba(0,0,0,0.1)",margin:"0 auto 16px"}}/>
            {/* Progress */}
            <div style={{background:allDone?`${T.success}15`:T.bg,borderRadius:16,padding:14,marginBottom:16,border:allDone?`2px solid ${T.success}40`:`2px solid rgba(0,0,0,0.04)`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".8rem",fontWeight:800,color:allDone?T.successDark:T.textPrimary,textTransform:"uppercase"}}>{allDone?"🎉 Alles geschafft!":`${done}/${total} Quests`}</span>
                <span style={{fontFamily:"'Fredoka',sans-serif",fontSize:".8rem",fontWeight:700,color:T.primary}}>+{state.dt} Min</span>
              </div>
              <div style={{background:"rgba(0,0,0,0.06)",borderRadius:50,height:8,overflow:"hidden"}}><div style={{height:"100%",borderRadius:50,width:`${pct*100}%`,background:allDone?`linear-gradient(90deg,${T.success},#6EE7B7)`:`linear-gradient(90deg,${T.primary},${T.primaryLight})`,transition:"width .6s ease"}}/></div>
            </div>

            {/* Quest groups */}
            {Object.entries(ANCHORS).map(([a,m])=>{const qs=byA[a]||[];if(!qs.length)return null;const secDone=qs.every(q=>q.done);
              return(<div key={a} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <span style={{fontSize:"1.1rem"}}>{m.icon}</span>
                  <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".72rem",fontWeight:800,textTransform:"uppercase",letterSpacing:".08em",color:m.col}}>{m.label}</span>
                  {secDone&&<span style={{fontSize:".65rem",color:T.success,fontWeight:800}}>✓ Fertig</span>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {qs.map(q=><button key={q.id} onClick={()=>!q.done&&!pMode&&complete(q.id)} disabled={q.done} style={{display:"flex",alignItems:"center",gap:12,background:q.done?`${T.success}08`:"white",border:q.done?`2px solid ${T.success}20`:q.id==="ft"?`2px solid ${T.success}30`:"2px solid rgba(0,0,0,0.06)",borderRadius:16,padding:"12px 14px",cursor:q.done?"default":"pointer",width:"100%",textAlign:"left",transition:"all .15s",opacity:q.done?.55:1,fontFamily:"'Nunito',sans-serif"}}>
                    <div style={{width:40,height:40,borderRadius:12,background:q.done?`${T.success}20`:`${m.col}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{q.done?"✅":q.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:".85rem",textDecoration:q.done?"line-through":"none"}}>{q.name}</div>
                      <div style={{display:"flex",gap:6,marginTop:2}}>
                        <span style={{fontSize:".6rem",fontWeight:700,color:T.primary}}>+{q.xp} XP</span>
                        <span style={{fontSize:".6rem",fontWeight:700,color:T.accentDark}}>+{q.minutes} Min</span>
                        {q.streak>0&&<span style={{fontSize:".6rem",fontWeight:700,color:"#F97316"}}>🔥{q.streak}</span>}
                      </div>
                    </div>
                    {pMode&&<button onClick={e=>{e.stopPropagation();rmQuest(q.id);}} style={{background:`${T.danger}15`,border:`1.5px solid ${T.danger}40`,borderRadius:8,padding:"3px 8px",color:T.danger,cursor:"pointer",fontSize:".6rem",fontWeight:800}}>✕</button>}
                  </button>)}
                </div>
              </div>);
            })}

            {/* Parent panel */}
            {pMode&&<div style={{background:T.bg,borderRadius:20,padding:16,border:`2px solid ${T.primary}15`,marginTop:8}}>
              <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".8rem",color:T.primary,marginBottom:10,textTransform:"uppercase"}}>⚙️ Eltern</div>
              {/* Vacation toggle */}
              <button onClick={togVac} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"white",border:`2px solid ${state.vacMode?T.success:"rgba(0,0,0,0.06)"}`,borderRadius:14,padding:"10px 14px",cursor:"pointer",marginBottom:12,fontFamily:"'Nunito',sans-serif"}}>
                <span style={{fontWeight:700,fontSize:".8rem",color:state.vacMode?T.successDark:T.textPrimary}}>{state.vacMode?"🏖️ Ferienmodus":"📚 Schulmodus"}</span>
                <div style={{width:40,height:22,borderRadius:11,background:state.vacMode?T.success:"rgba(0,0,0,0.12)",position:"relative",transition:"all .3s"}}><div style={{width:16,height:16,borderRadius:8,background:"white",position:"absolute",top:3,left:state.vacMode?21:3,transition:"all .3s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/></div>
              </button>
              {/* Add quest */}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <input value={nq.name} onChange={e=>setNq(n=>({...n,name:e.target.value}))} placeholder="Neue Quest..." style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:12,padding:"8px 12px",fontSize:".8rem",fontFamily:"'Nunito',sans-serif",outline:"none",fontWeight:600}}/>
                <div style={{display:"flex",gap:6}}>
                  <select value={nq.anchor} onChange={e=>setNq(n=>({...n,anchor:e.target.value}))} style={{flex:1,background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:10,padding:"6px",fontSize:".75rem"}}><option value="morning">🌅 Morgens</option><option value="afternoon">☀️ Nachmittags</option><option value="evening">🌙 Abends</option></select>
                  <input type="number" value={nq.xp} onChange={e=>setNq(n=>({...n,xp:+e.target.value}))} style={{width:50,background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:10,padding:"6px",fontSize:".75rem",textAlign:"center"}} placeholder="XP"/>
                  <input type="number" value={nq.minutes} onChange={e=>setNq(n=>({...n,minutes:+e.target.value}))} style={{width:50,background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:10,padding:"6px",fontSize:".75rem",textAlign:"center"}} placeholder="Min"/>
                </div>
                <button onClick={addQuest} style={{background:`linear-gradient(135deg,${T.primary},${T.primaryLight})`,border:"none",borderRadius:12,padding:"10px",color:"white",fontWeight:800,cursor:"pointer",fontSize:".8rem",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Erstellen</button>
              </div>
              <div style={{display:"flex",gap:6,marginTop:10}}>
                <button onClick={resetDay} style={{flex:1,background:`${T.accent}20`,border:`1.5px solid ${T.accent}`,borderRadius:10,padding:"8px",color:T.accentDark,cursor:"pointer",fontSize:".7rem",fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>🔄 Tag</button>
                <button onClick={resetAll} style={{flex:1,background:`${T.danger}15`,border:`1.5px solid ${T.danger}`,borderRadius:10,padding:"8px",color:T.danger,cursor:"pointer",fontSize:".7rem",fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>🗑️ Alles</button>
              </div>
            </div>}
          </div>
        </div>}

        {/* ═══ TIME BANK ═══ */}
        {view==="time"&&<div style={{minHeight:"100vh",padding:"env(safe-area-inset-top, 12px) 20px 100px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,paddingTop:8}}>
            <button onClick={()=>setView("hub")} style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"8px 16px",cursor:"pointer",fontWeight:800,fontSize:".8rem",color:T.textPrimary,fontFamily:"'Nunito',sans-serif"}}>← Zurück</button>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,color:T.primary,textTransform:"uppercase",fontStyle:"italic"}}>Zeitbank</div>
            <div style={{width:80}}/>
          </div>
          <div style={{background:`linear-gradient(135deg, ${T.primary}12, ${T.success}10)`,borderRadius:24,padding:28,textAlign:"center",marginBottom:24,border:`2px solid ${T.primary}15`}}>
            <div style={{fontSize:".75rem",color:T.textSecondary,fontWeight:600,marginBottom:4}}>Heute verdient</div>
            <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"3rem",fontWeight:700,color:T.success}}>{state.dt} <span style={{fontSize:"1rem",color:T.textSecondary}}>Min</span></div>
            <div style={{fontSize:".7rem",color:T.primaryLight,fontWeight:700,marginTop:4}}>{allDone?"🎉 Alle Quests erledigt!":`${total-done} Quests übrig`}</div>
          </div>
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".75rem",color:T.textSecondary,textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Belohnungen</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {state.rewards.map(r=>{const can=state.dt>=r.minutes;return(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:14,background:"white",border:can?`2px solid ${T.success}30`:"2px solid rgba(0,0,0,0.04)",borderRadius:18,padding:"14px 16px",opacity:can?1:.45,boxShadow:can?`0 4px 16px ${T.success}15`:"0 2px 8px rgba(0,0,0,0.03)"}}>
                <div style={{width:48,height:48,borderRadius:14,background:can?`${T.success}15`:T.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem"}}>{r.icon}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:".9rem"}}>{r.name}</div><div style={{fontSize:".65rem",color:T.textSecondary,fontWeight:600}}>{r.minutes} Minuten</div></div>
                <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:".8rem",fontWeight:700,color:can?T.success:T.textLight}}>{can?"✓ Frei":"🔒"}</div>
              </div>);})}
          </div>
        </div>}

        {/* ═══ ACHIEVEMENTS ═══ */}
        {view==="stats"&&<div style={{minHeight:"100vh",padding:"env(safe-area-inset-top, 12px) 20px 100px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,paddingTop:8}}>
            <button onClick={()=>setView("hub")} style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"8px 16px",cursor:"pointer",fontWeight:800,fontSize:".8rem",color:T.textPrimary,fontFamily:"'Nunito',sans-serif"}}>← Zurück</button>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,color:T.primary,textTransform:"uppercase",fontStyle:"italic"}}>Erfolge</div>
            <div style={{width:80}}/>
          </div>
          {/* Hero card */}
          <div style={{background:"white",borderRadius:20,padding:20,display:"flex",alignItems:"center",gap:16,marginBottom:24,boxShadow:"0 4px 20px rgba(0,0,0,0.06)",border:"2px solid rgba(0,0,0,0.04)"}}>
            <HeroSprite shape={state.hero.shape} color={state.hero.color} eyes={state.hero.eyes} hair={state.hero.hair} size={72} level={level}/>
            <div>
              <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:"1rem",color:T.textPrimary}}>{state.hero.name}</div>
              <div style={{fontSize:".7rem",color:T.textSecondary,fontWeight:600}}>Level {level} Held</div>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <span style={{fontSize:".65rem",fontWeight:700,color:T.primary}}>⚡ {state.xp} XP</span>
                <span style={{fontSize:".65rem",fontWeight:700,color:T.accentDark}}>🪙 {state.coins}</span>
                <span style={{fontSize:".65rem",fontWeight:700,color:"#F97316"}}>🔥 {state.sd}d</span>
              </div>
            </div>
          </div>
          {/* Badges */}
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".75rem",color:T.textSecondary,textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Badges</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:24}}>
            {BADGES.map((b,i)=><div key={i} style={{background:b.u?"white":T.bg,border:b.u?`2px solid ${T.primary}30`:"2px solid rgba(0,0,0,0.04)",borderRadius:16,padding:"14px 8px",textAlign:"center",opacity:b.u?1:.35,boxShadow:b.u?`0 4px 12px ${T.primary}10`:"none"}}>
              <div style={{fontSize:"1.8rem",marginBottom:4}}>{b.i}</div>
              <div style={{fontSize:".65rem",fontWeight:800,color:b.u?T.primary:T.textLight}}>{b.n}</div>
            </div>)}
          </div>
          {/* Stats */}
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".75rem",color:T.textSecondary,textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Statistik</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[{l:"Gesamt XP",v:state.xp,i:"⚡"},{l:"Münzen",v:state.coins,i:"🪙"},{l:"Quests erledigt",v:state.hist.length,i:"⚔️"},{l:"Tage-Streak",v:state.sd,i:"🔥"},{l:"Level",v:level,i:"📈"}].map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"white",borderRadius:14,padding:"12px 16px",border:"2px solid rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:"1.1rem"}}>{s.i}</span><span style={{fontSize:".8rem",fontWeight:700}}>{s.l}</span></div>
              <span style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1rem",fontWeight:700,color:T.primary}}>{s.v}</span>
            </div>)}
          </div>
        </div>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(HeroDex));
</script>
</body>
</html>
