const LVL=[0,50,120,220,360,550,800,1100,1500,2000,2600,3300,4100,5000,6000,7200];
function getLevel(xp){let l=1;for(let i=1;i<LVL.length;i++){if(xp>=LVL[i])l=i+1;else break;}return l;}
function getXPP(xp){const l=getLevel(xp);const c=LVL[l-1]||0;const n=LVL[l]||c+500;return{cur:xp-c,need:n-c};}
function buildDay(vac){const b=(vac?VACATION_QUESTS:SCHOOL_QUESTS).map(q=>({...q,done:false,streak:0}));const d=new Date().getDay();if((d===1||d===3)&&!vac)b.push({...FOOTBALL,done:false,streak:0});return b;}
