// ── Sound Engine (Web Audio API) ──
const SFX = {
  _ctx: null,
  _get(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx;},
  play(type){
    try{
      const ctx=this._get();const now=ctx.currentTime;
      if(type==="pop"){
        // Quest complete: bright rising pop
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sine";o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(1200,now+0.1);
        g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);
        o.start(now);o.stop(now+0.15);
      } else if(type==="coin"){
        // Coin earn: metallic chime
        [800,1000,1200].forEach((f,i)=>{
          const o=ctx.createOscillator();const g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);
          o.type="triangle";o.frequency.setValueAtTime(f,now+i*0.06);
          g.gain.setValueAtTime(0.2,now+i*0.06);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.06+0.12);
          o.start(now+i*0.06);o.stop(now+i*0.06+0.12);
        });
      } else if(type==="levelup"){
        // Level up: ascending arpeggio
        [523,659,784,1047].forEach((f,i)=>{
          const o=ctx.createOscillator();const g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);
          o.type="sine";o.frequency.setValueAtTime(f,now+i*0.1);
          g.gain.setValueAtTime(0.25,now+i*0.1);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.1+0.2);
          o.start(now+i*0.1);o.stop(now+i*0.1+0.2);
        });
      } else if(type==="celeb"){
        // All done: celebration fanfare
        [784,988,1175,1568,1175,1568].forEach((f,i)=>{
          const o=ctx.createOscillator();const g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);
          o.type="square";o.frequency.setValueAtTime(f,now+i*0.08);
          g.gain.setValueAtTime(0.15,now+i*0.08);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.08+0.15);
          o.start(now+i*0.08);o.stop(now+i*0.08+0.15);
        });
      } else if(type==="tap"){
        // UI tap: subtle click
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sine";o.frequency.setValueAtTime(1000,now);
        g.gain.setValueAtTime(0.1,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.05);
        o.start(now);o.stop(now+0.05);
      } else if(type==="buy"){
        // Shop purchase: sparkle
        [1200,900,1400].forEach((f,i)=>{
          const o=ctx.createOscillator();const g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);
          o.type="sine";o.frequency.setValueAtTime(f,now+i*0.08);
          g.gain.setValueAtTime(0.2,now+i*0.08);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.08+0.1);
          o.start(now+i*0.08);o.stop(now+i*0.08+0.1);
        });
      }
    }catch(e){}
  }
};

const LVL=[0,50,120,220,360,550,800,1100,1500,2000,2600,3300,4100,5000,6000,7200];
function getLevel(xp){let l=1;for(let i=1;i<LVL.length;i++){if(xp>=LVL[i])l=i+1;else break;}return l;}
function getLvlProg(xp){const l=getLevel(xp);const c=LVL[l-1]||0;const n=LVL[l]||c+500;return{cur:xp-c,need:n-c};}
function buildDay(vac){const b=(vac?VACATION_QUESTS:SCHOOL_QUESTS).map(q=>({...q,done:false,streak:0}));const d=new Date().getDay();if((d===1||d===3)&&!vac)b.push({...FOOTBALL,done:false,streak:0});return b;}

function SpinWheel({onResult,onClose}){
  const[spinning,setSpinning]=useState(false);
  const[angle,setAngle]=useState(0);
  const[result,setResult]=useState(null);
  const spin=()=>{
    if(spinning)return;
    SFX.play("tap");

    const idx=Math.floor(Math.random()*WHEEL_SEGMENTS.length);
    const targetAngle=360*5+(idx*(360/WHEEL_SEGMENTS.length))+(360/WHEEL_SEGMENTS.length/2);
    setAngle(targetAngle);
    setTimeout(()=>{
      SFX.play("celeb");
      setResult(WHEEL_SEGMENTS[idx]);
      setSpinning(false);
    },3500);
  };
  const segAngle=360/WHEEL_SEGMENTS.length;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:9990,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .3s ease"}}>

        {/* Pointer */}

        <svg width="220" height="220" style={{transform:`rotate(${angle}deg)`,transition:spinning?"transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99)":"none"}}>
          {WHEEL_SEGMENTS.map((seg,i)=>{
            const startA=(i*segAngle-90)*Math.PI/180;
            const endA=((i+1)*segAngle-90)*Math.PI/180;
            const x1=110+100*Math.cos(startA);const y1=110+100*Math.sin(startA);

            return <g key={i}>
              <path d={`M110,110 L${x1},${y1} A100,100 0 0,1 ${x2},${y2} Z`} fill={seg.color} stroke="white" strokeWidth="2"/>
              <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle" fontSize="20" transform={`rotate(${(i+0.5)*segAngle},${tx},${ty})`}>{seg.icon}</text>
            </g>;

        </svg>

      {!result?<button onClick={spin} disabled={spinning} style={{background:`linear-gradient(135deg,${T.primary},${T.primaryLight})`,border:"none",borderRadius:50,padding:"14px 36px",color:"white",fontWeight:800,fontSize:"1rem",cursor:spinning?"default":"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",opacity:spinning?.6:1,boxShadow:`0 8px 24px ${T.primary}40`}}>{spinning?"Dreht...":"Drehen! 🎡"}</button>

  // Step 9: Cat name (with ref for focus fix)

      <div style={{textAlign:"center"}}><div style={{fontSize:"1.5rem"}}>🪙</div><div style={{fontFamily:"'Fredoka',sans-serif",fontWeight:700,color:T.accentDark}}>{obCoins}</div></div>

    </div>
  </div><OBBtn onClick={()=>onComplete({hero:{...hero},catVariant:selCat||sugg,catName,startXP:obXP,startCoins:obCoins})} big>Abenteuer starten! 🦸🐱</OBBtn></OBWrap>;

  return null;
}


// ── Main App ──
function HeroDex(){
  const[state,setState]=useState(null);
  const[boarding,setBoarding]=useState(null);
  const[view,setView]=useState("hub");
  const[questOpen,setQuestOpen]=useState(false);
  const[celeb,setCeleb]=useState(false);
  const[pMode,setPMode]=useState(false);
  const[pinShow,setPinShow]=useState(false);
  const[pin,setPin]=useState("");
  const[nq,setNq]=useState({name:"",icon:"⭐",anchor:"morning",xp:15,minutes:5});
  const[shopTab,setShopTab]=useState("hero");
  const[showWheel,setShowWheel]=useState(false);
  const[showChest,setShowChest]=useState(false);
  const[rareDrop,setRareDrop]=useState(null);
  const nqRef=useRef(null);
  const journalRef=useRef(null);

  useEffect(()=>{(async()=>{try{const s=await window.storage.get("hdx2");if(s?.value){const p=JSON.parse(s.value);const today=new Date().toDateString();if(p.lastDate!==today){p.quests=buildDay(p.vacMode).map(q=>({...q,streak:(p.sm||{})[q.id]||0}));p.lastDate=today;p.dt=0;p.moodAM=null;p.moodPM=null;p.journal="";p.jAnswers={};p.rainbow=[false,false,false,false,false,false];p.wheelSpun=false;p.chestMilestone=null;
    // Weekly mission rotation (new week = Monday)
    const dayOfWeek=new Date().getDay();
    const weekStart=p.weekStart?new Date(p.weekStart):new Date();
    const daysSinceStart=Math.floor((new Date()-weekStart)/(1000*60*60*24));
    if(daysSinceStart>=7||!p.weeklyMission){const wm=WEEKLY_MISSIONS[Math.floor(Math.random()*WEEKLY_MISSIONS.length)];p.weeklyMission=wm.id;p.weeklyProgress=0;p.weekStart=today;}
    // Quest graduation check
    if(!p.graduated)p.graduated=[];
    Object.entries(p.sm||{}).forEach(([qid,streak])=>{if(streak>=GRADUATION_THRESHOLD&&!p.graduated.includes(qid))p.graduated.push(qid);});
  }
  if(!p.purchased)p.purchased=[];if(!p.rainbow)p.rainbow=[false,false,false,false,false,false];if(p.moodAM===undefined)p.moodAM=null;if(p.moodPM===undefined)p.moodPM=null;if(p.journal===undefined)p.journal="";if(!p.jAnswers)p.jAnswers={};if(p.wheelSpun===undefined)p.wheelSpun=false;if(p.xpBoost===undefined)p.xpBoost=false;if(!p.weeklyMission){const wm=WEEKLY_MISSIONS[Math.floor(Math.random()*WEEKLY_MISSIONS.length)];p.weeklyMission=wm.id;p.weeklyProgress=0;p.weekStart=new Date().toDateString();}if(!p.graduated)p.graduated=[];setState(p);setBoarding(false);return;}}catch(e){}setBoarding(true);})();},[]);
  useEffect(()=>{if(state)try{window.storage.set("hdx2",JSON.stringify(state));}catch(e){}},[state]);

  const onBoard=({hero,catVariant,catName,startXP,startCoins})=>{
    const wm=WEEKLY_MISSIONS[Math.floor(Math.random()*WEEKLY_MISSIONS.length)];
    setState({hero,catVariant,catName,xp:startXP||0,coins:startCoins||0,quests:buildDay(false),rewards:REWARDS,acc:[],sd:0,lastDate:new Date().toDateString(),dt:0,hist:[],vacMode:false,sm:{},roomItems:[],purchased:[],moodAM:null,moodPM:null,journal:"",jAnswers:{},rainbow:[false,false,false,false,false,false],wheelSpun:false,chestMilestone:null,xpBoost:false,weeklyMission:wm.id,weeklyProgress:0,weekStart:new Date().toDateString(),graduated:[]});setBoarding(false);};

  const complete=useCallback(id=>{setState(prev=>{const q=prev.quests.find(x=>x.id===id);if(!q||q.done)return prev;setCeleb(true);SFX.play("pop");setTimeout(()=>SFX.play("coin"),200);
    const nq2=prev.quests.map(x=>x.id===id?{...x,done:true,streak:x.streak+1}:x);
    const all=nq2.every(x=>x.done);
    if(all)setTimeout(()=>SFX.play("celeb"),400);
    const xpMult=prev.xpBoost?2:1;
    const earnedXP=(q.xp+(all?30:0))*xpMult;
    const prevLvl=getLevel(prev.xp);const newXP=prev.xp+earnedXP;const newLvl=getLevel(newXP);
    if(newLvl>prevLvl)setTimeout(()=>SFX.play("levelup"),300);
    const sm={...prev.sm,[id]:(prev.sm[id]||0)+1};
    const newSD=all?prev.sd+1:prev.sd;
    // Rare drop check
    const isRare=Math.random()<RARE_DROP_CHANCE;
    if(isRare){const drop=RARE_DROPS[Math.floor(Math.random()*RARE_DROPS.length)];setTimeout(()=>setRareDrop(drop),600);}
    // Wheel available when all done
    if(all&&!prev.wheelSpun)setTimeout(()=>setShowWheel(true),1200);
    // Chest milestone check
    const chestEarned=all&&CHEST_MILESTONES.includes(newSD)&&!prev.chestMilestone;
    if(chestEarned)setTimeout(()=>setShowChest(true),all?2500:800);
    // Apply rare drop rewards inline
    let bonusXP=0,bonusCoins=0,bonusMin=0;
    if(isRare){const drop=RARE_DROPS[Math.floor(Math.random()*RARE_DROPS.length)];if(drop.type==="xp")bonusXP=drop.amount;if(drop.type==="coins")bonusCoins=drop.amount;if(drop.type==="minutes")bonusMin=drop.amount;}
    // Weekly mission progress
    const wm=WEEKLY_MISSIONS.find(m=>m.id===prev.weeklyMission);
    let wp=prev.weeklyProgress||0;
    if(wm&&all){
      if(wm.goal==="allDone5"||wm.goal==="allDone7")wp++;
      if(wm.goal==="allMorning5"){const morningDone=nq2.filter(q=>q.anchor==="morning").every(q=>q.done);if(morningDone)wp++;}
      if(wm.goal==="allEvening7"){const eveningDone=nq2.filter(q=>q.anchor==="evening").every(q=>q.done);if(eveningDone)wp++;}
    }
    if(wm&&q.id==="ft"&&wm.goal==="football2")wp++;
    if(wm&&q.id==="s8"&&wm.goal==="read7")wp++;
    const wmComplete=wm&&wp>=wm.target&&(prev.weeklyProgress||0)<wm.target;
    let wmBonusXP=0,wmBonusCoins=0;
    if(wmComplete){if(wm.reward.type==="coins")wmBonusCoins=wm.reward.amount;if(wm.reward.type==="xp")wmBonusXP=wm.reward.amount;}
    return{...prev,quests:nq2,xp:newXP+bonusXP+wmBonusXP,coins:prev.coins+Math.floor(q.xp/3)+(all?15:0)+bonusCoins+wmBonusCoins,dt:prev.dt+q.minutes+bonusMin,sd:newSD,hist:[...prev.hist,{id,d:Date.now()}],sm,chestMilestone:chestEarned?newSD:prev.chestMilestone,xpBoost:all?false:prev.xpBoost,weeklyProgress:wp};});},[]);

  const addQuest=()=>{if(!nq.name.trim())return;setState(p=>({...p,quests:[...p.quests,{id:"c_"+Date.now(),name:nq.name.trim(),icon:nq.icon,anchor:nq.anchor,xp:nq.xp,minutes:nq.minutes,done:false,streak:0}]}));setNq(n=>({...n,name:""}));};
  const rmQuest=id=>setState(p=>({...p,quests:p.quests.filter(q=>q.id!==id)}));
  const togVac=()=>setState(p=>{const nv=!p.vacMode;return{...p,vacMode:nv,quests:buildDay(nv).map(q=>({...q,streak:(p.sm||{})[q.id]||0})),dt:0};});
  const resetDay=()=>setState(p=>({...p,quests:p.quests.map(q=>({...q,done:false})),dt:0,lastDate:new Date().toDateString()}));
  const resetAll=()=>{try{window.storage.delete("hdx2");}catch(e){}setState(null);setBoarding(true);};
  const buyItem=(id,cost)=>{if(state.coins<cost||(state.purchased||[]).includes(id))return;SFX.play("buy");setState(p=>({...p,coins:p.coins-cost,purchased:[...(p.purchased||[]),id]}));};
  const setMood=(period,val)=>setState(p=>({...p,[period]:val}));
  const setJournal=(val)=>setState(p=>({...p,journal:val}));
  const setJAnswer=(qid,val)=>setState(p=>({...p,jAnswers:{...(p.jAnswers||{}),[qid]:val}}));
  const toggleRainbow=(idx)=>setState(p=>{const r=[...(p.rainbow||[false,false,false,false,false,false])];r[idx]=!r[idx];const allDone=r.every(Boolean);return{...p,rainbow:r,xp:allDone&&!p.rainbow.every(Boolean)?p.xp+25:p.xp,coins:allDone&&!p.rainbow.every(Boolean)?p.coins+20:p.coins};});
  const collectWheel=(result)=>{setState(p=>{let u={...p,wheelSpun:true};if(result.type==="coins")u.coins+=result.amount;if(result.type==="xp")u.xp+=result.amount;if(result.type==="minutes")u.dt+=result.amount;if(result.type==="rare"){const r=RARE_DROPS[Math.floor(Math.random()*RARE_DROPS.length)];if(r.type==="coins")u.coins+=r.amount||30;if(r.type==="xp")u.xp+=r.amount||25;if(r.type==="minutes")u.dt+=r.amount||5;}return u;});setShowWheel(false);};
  const collectChest=(reward)=>{setState(p=>{let u={...p,chestMilestone:null};if(reward.type==="coins")u.coins+=reward.amount;if(reward.type==="xp")u.xp+=reward.amount;if(reward.type==="minutes")u.dt+=reward.amount;if(reward.type==="item"&&!u.purchased.includes(reward.id))u.purchased=[...u.purchased,reward.id];if(reward.type==="xpboost")u.xpBoost=true;return u;});setShowChest(false);};
  const clearRareDrop=()=>{setRareDrop(null);};

  if(boarding===null)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,color:T.textPrimary,fontFamily:"'Nunito',sans-serif"}}>Laden...</div>;
  if(boarding)return<Onboarding onComplete={onBoard}/>;
  if(!state)return null;

  const level=getLevel(state.xp);const xpP=getLvlProg(state.xp);
  const done=state.quests.filter(q=>q.done).length;const total=state.quests.length;const allDone=done===total&&total>0;
  const pct=total>0?done/total:0;
  const mood=allDone?"excited":pct>0.5?"happy":pct>0?"neutral":"sleepy";
  const dayN=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"][new Date().getDay()];
  const byA={};state.quests.forEach(q=>{if(!byA[q.anchor])byA[q.anchor]=[];byA[q.anchor].push(q);});
  const BADGES=[{i:"🌟",n:"Erster Tag",u:state.xp>0},{i:"🔥",n:"3-Tage",u:state.sd>=3},{i:"⚡",n:"7-Tage",u:state.sd>=7},{i:"👑",n:"Level 5",u:level>=5},{i:"🎯",n:"50 Quests",u:state.hist.length>=50},{i:"💎",n:"Level 10",u:level>=10},{i:"🏰",n:"30 Tage",u:state.sd>=30},{i:"🐉",n:"100 Quests",u:state.hist.length>=100},{i:"🐱",n:"Sammler",u:state.acc.length>0}];

  return(

        @keyframes celebText{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:0}}

        @keyframes rewardPop{0%{transform:translateX(-50%) scale(0.5) translateY(20px);opacity:0}30%{transform:translateX(-50%) scale(1.1) translateY(0);opacity:1}50%{transform:translateX(-50%) scale(1) translateY(0);opacity:1}100%{transform:translateX(-50%) scale(0.9) translateY(-30px);opacity:0}}

      <Celebration active={celeb} onDone={()=>setCeleb(false)}/>

        </div>
      </div>}

      <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Nunito',sans-serif",color:T.textPrimary}}>

        {/* ═══ HUB ═══ */}
        {view==="hub"&&<div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <div style={{background:getSky(done,total),borderRadius:"0 0 32px 32px",padding:"env(safe-area-inset-top, 12px) 20px 32px",position:"relative",overflow:"hidden",minHeight:380,display:"flex",flexDirection:"column"}}>

            {/* XP */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:".6rem",color:"rgba(255,255,255,0.6)",marginBottom:3}}><span>Level {level}</span><span>{xpP.cur}/{xpP.need} XP</span></div>
              <div style={{background:"rgba(255,255,255,0.15)",borderRadius:50,height:8,overflow:"hidden"}}><div style={{height:"100%",borderRadius:50,width:`${Math.min(100,(xpP.cur/xpP.need)*100)}%`,background:"linear-gradient(90deg, #FCD34D, #F59E0B)",transition:"width .8s ease"}}/></div>
            </div>
            {/* Hero + Cat + Ring */}
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}><ProgressRing progress={pct} size={200} stroke={6} color={allDone?"#34D399":"rgba(255,255,255,0.4)"}/></div>
                <div style={{animation:"heroFloat 3s ease-in-out infinite",cursor:"pointer",position:"relative",zIndex:2}} onClick={()=>setQuestOpen(true)}>
                  <HeroSprite shape={state.hero.shape} color={state.hero.color} eyes={state.hero.eyes} hair={state.hero.hair} size={140} level={level}/>
                </div>
                <div style={{position:"absolute",bottom:-10,right:-40,animation:"catIdle 4s ease-in-out infinite",zIndex:3}}>
                  <CatSidekick variant={state.catVariant} mood={mood} size={56}/>
                </div>
              </div>
            </div>
            <div style={{textAlign:"center",paddingBottom:8}}>
              <div style={{fontSize:".75rem",color:"rgba(255,255,255,0.7)",fontWeight:600}}>{getTimeLabel(done,total)}</div>
              <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.1rem",fontWeight:700,color:"white"}}>{done}/{total} Quests {allDone?"🎉":""}</div>
              <div style={{fontSize:".7rem",color:"rgba(255,255,255,0.6)",marginTop:2}}>+{state.dt} Min verdient</div>
              {state.xpBoost&&<div style={{fontSize:".65rem",color:"#FCD34D",fontWeight:800,marginTop:4,animation:"pulse 1.5s infinite"}}>🔥 DOPPEL-XP AKTIV!</div>}
              {(()=>{const next=CHEST_MILESTONES.find(m=>m>state.sd);return next?<div style={{fontSize:".6rem",color:"rgba(255,255,255,0.45)",marginTop:3}}>🎁 Nächste Truhe: {next}-Tage Streak ({state.sd}/{next})</div>:null;})()}
            </div>
          </div>
          {/* Mood Check */}
          {state.moodAM===null&&<div style={{padding:"12px 20px 0"}}>
            <div style={{background:"white",borderRadius:20,padding:16,boxShadow:"0 4px 16px rgba(0,0,0,0.05)",border:"2px solid rgba(0,0,0,0.04)"}}>
              <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".75rem",fontWeight:800,color:T.textSecondary,textTransform:"uppercase",marginBottom:10}}>Wie fühlst du dich heute? 🌅</div>
              <div style={{display:"flex",justifyContent:"space-between",gap:4}}>{MOOD_EMOJIS.map((e,i)=><button key={i} onClick={()=>{setMood("moodAM",i);setCeleb(true);}} style={{fontSize:"1.8rem",background:"none",border:"none",cursor:"pointer",padding:"6px",borderRadius:12,transition:"all .15s"}}>{e}</button>)}</div>
            </div>
          </div>}

          {/* Weekly Mission Card */}
          {(()=>{const wm=WEEKLY_MISSIONS.find(m=>m.id===state.weeklyMission);if(!wm)return null;const wp=state.weeklyProgress||0;const done=wp>=wm.target;
            return <div style={{padding:"8px 20px 0"}}><div style={{background:done?"linear-gradient(135deg, rgba(52,211,153,0.1), rgba(52,211,153,0.05))":"white",borderRadius:20,padding:14,boxShadow:"0 4px 16px rgba(0,0,0,0.05)",border:done?`2px solid ${T.success}30`:"2px solid rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:"1.4rem"}}>{wm.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".72rem",fontWeight:800,color:done?T.successDark:T.primary,textTransform:"uppercase"}}>{done?"✅ Mission geschafft!":"Wochen-Mission"}</div>
                  <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:".9rem",fontWeight:700,color:T.textPrimary}}>{wm.title}</div>
                </div>
                <div style={{textAlign:"right"}}><div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.1rem",fontWeight:700,color:done?T.success:T.primary}}>{Math.min(wp,wm.target)}/{wm.target}</div></div>
              </div>
              <div style={{fontSize:".7rem",color:T.textSecondary,marginBottom:8}}>{wm.story}</div>
              <div style={{background:"rgba(0,0,0,0.06)",borderRadius:50,height:8,overflow:"hidden"}}><div style={{height:"100%",borderRadius:50,width:`${Math.min(100,(wp/wm.target)*100)}%`,background:done?`linear-gradient(90deg,${T.success},#6EE7B7)`:`linear-gradient(90deg,${T.primary},${T.primaryLight})`,transition:"width .6s ease"}}/></div>
              {done&&<div style={{fontSize:".65rem",color:T.success,fontWeight:700,marginTop:6,textAlign:"center"}}>🎉 +{wm.reward.amount} {wm.reward.type==="coins"?"Münzen":"XP"} erhalten!</div>}
            </div></div>;
          })()}

          {!questOpen&&<div style={{textAlign:"center",padding:"16px 0 8px"}}><button onClick={()=>{SFX.play("tap");setQuestOpen(true);}} style={{background:`linear-gradient(135deg,${T.primary},${T.primaryLight})`,border:"none",borderRadius:50,padding:"14px 36px",color:"white",fontWeight:800,fontSize:".9rem",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",textTransform:"uppercase",letterSpacing:".05em",boxShadow:`0 8px 24px ${T.primary}40`}}>⚔️ Quests öffnen</button></div>}
          <div style={{display:"flex",gap:6,padding:"8px 20px 20px",justifyContent:"center"}}>
            {[{id:"room",l:"Zimmer",i:"🏠"},{id:"time",l:"Zeit",i:"⏰"},{id:"shop",l:"Shop",i:"🛍️"},{id:"journal",l:"Buch",i:"📓"},{id:"stats",l:"Erfolge",i:"🏆"}].map(t=><button key={t.id} onClick={()=>{SFX.play("tap");setView(t.id);}} style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"7px 12px",fontWeight:800,fontSize:".64rem",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",color:T.textSecondary,textTransform:"uppercase",letterSpacing:".03em"}}>{t.i} {t.l}</button>)}
          </div>
        </div>}

        {/* ═══ QUEST BOARD (overlay) - FIXED: close button + backdrop ═══ */}
        {questOpen&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column"}}>
          {/* Backdrop - clickable to close */}
          <div style={{flex:"0 0 60px",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(4px)",cursor:"pointer"}} onClick={()=>setQuestOpen(false)}/>
          <div style={{flex:"1 1 auto",background:"white",borderRadius:"28px 28px 0 0",padding:"0 20px 100px",overflow:"auto",animation:"slideUp .3s ease",boxShadow:"0 -8px 40px rgba(0,0,0,0.1)",position:"relative"}}>
            {/* Close button (visible, works on desktop) */}
            <div style={{position:"sticky",top:0,background:"white",paddingTop:12,paddingBottom:8,zIndex:10,display:"flex",justifyContent:"space-between",alignItems:"center",borderRadius:"28px 28px 0 0"}}>
              <div style={{width:40,height:4,borderRadius:2,background:"rgba(0,0,0,0.1)",margin:"0 auto"}}/>
              <button onClick={()=>setQuestOpen(false)} style={{position:"absolute",right:0,top:8,background:T.bg,border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"1rem",fontWeight:800,color:T.textSecondary}}>✕</button>
            </div>

            {/* Progress */}
            <div style={{background:allDone?`${T.success}15`:T.bg,borderRadius:16,padding:14,marginBottom:16,border:allDone?`2px solid ${T.success}40`:"2px solid rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".8rem",fontWeight:800,color:allDone?T.successDark:T.textPrimary,textTransform:"uppercase"}}>{allDone?"🎉 Alles geschafft!":`${done}/${total} Quests`}</span>
                <span style={{fontFamily:"'Fredoka',sans-serif",fontSize:".8rem",fontWeight:700,color:T.primary}}>+{state.dt} Min</span>
              </div>
              <div style={{background:"rgba(0,0,0,0.06)",borderRadius:50,height:8,overflow:"hidden"}}><div style={{height:"100%",borderRadius:50,width:`${pct*100}%`,background:allDone?`linear-gradient(90deg,${T.success},#6EE7B7)`:`linear-gradient(90deg,${T.primary},${T.primaryLight})`,transition:"width .6s ease"}}/></div>
            </div>

            {/* 🌈 Eat the Rainbow */}
            <div style={{background:"white",borderRadius:16,padding:14,marginBottom:16,border:"2px solid rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".72rem",fontWeight:800,color:T.textPrimary,textTransform:"uppercase"}}>🌈 Eat the Rainbow</span>
                {(state.rainbow||[]).every(Boolean)&&<span style={{fontSize:".65rem",fontWeight:800,color:T.success}}>+25 XP! 🎉</span>}
              </div>
              <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>{RAINBOW.map((emoji,i)=>{
                const done=(state.rainbow||[])[i];
                return <button key={i} onClick={()=>toggleRainbow(i)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 4px",borderRadius:12,background:done?`${T.success}15`:"rgba(0,0,0,0.02)",border:done?`2px solid ${T.success}30`:"2px solid rgba(0,0,0,0.04)",cursor:"pointer",transition:"all .15s",opacity:done?1:0.5}}>
                  <span style={{fontSize:"1.3rem"}}>{emoji}</span>
                  <span style={{fontSize:".5rem",fontWeight:700,color:done?T.successDark:T.textLight}}>{RAINBOW_LABELS[i]}</span>
                </button>;
              })}</div>
              <div style={{fontSize:".55rem",color:T.textLight,marginTop:6,textAlign:"center"}}>Tippe auf jede Farbe die du heute gegessen hast!</div>
            </div>

            {/* Evening mood + journal prompt */}
            {allDone&&state.moodPM===null&&<div style={{background:`linear-gradient(135deg,${T.primary}08,${T.accent}10)`,borderRadius:16,padding:16,marginBottom:16,border:`2px solid ${T.primary}15`}}>
              <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".75rem",fontWeight:800,color:T.primary,textTransform:"uppercase",marginBottom:10}}>🌙 Wie war dein Tag?</div>
              <div style={{display:"flex",justifyContent:"space-between",gap:4,marginBottom:12}}>{MOOD_EMOJIS.map((e,i)=><button key={i} onClick={()=>setMood("moodPM",i)} style={{fontSize:"1.6rem",background:state.moodPM===i?`${T.primary}15`:"none",border:state.moodPM===i?`2px solid ${T.primary}`:"none",cursor:"pointer",padding:"4px",borderRadius:10}}>{e}</button>)}</div>
            </div>}

            {/* Quest groups */}
            {Object.entries(ANCHORS).map(([a,m])=>{const qs=byA[a]||[];if(!qs.length)return null;const secDone=qs.every(q=>q.done);
              return(<div key={a} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <span style={{fontSize:"1.1rem"}}>{m.icon}</span>
                  <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:".72rem",fontWeight:800,textTransform:"uppercase",letterSpacing:".08em",color:m.col}}>{m.label}</span>
                  {secDone&&<span style={{fontSize:".65rem",color:T.success,fontWeight:800}}>✓ Fertig</span>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {qs.map(q=>{const grad=(state.graduated||[]).includes(q.id);return <button key={q.id} onClick={()=>!q.done&&!pMode&&complete(q.id)} disabled={q.done} style={{display:"flex",alignItems:"center",gap:12,background:grad?`${T.accent}08`:q.done?`${T.success}08`:"white",border:grad?`2px solid ${T.accent}30`:q.done?`2px solid ${T.success}20`:q.id==="ft"?`2px solid ${T.success}30`:"2px solid rgba(0,0,0,0.06)",borderRadius:16,padding:"12px 14px",cursor:q.done?"default":"pointer",width:"100%",textAlign:"left",transition:"all .15s",opacity:q.done?.55:1,fontFamily:"'Nunito',sans-serif"}}>
                    <div style={{width:40,height:40,borderRadius:12,background:grad?`${T.accent}20`:q.done?`${T.success}20`:`${m.col}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{grad?"🎓":q.done?"✅":q.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:".85rem",textDecoration:q.done?"line-through":"none"}}>{q.name}</div>
                      <div style={{display:"flex",gap:6,marginTop:2}}>
                        <span style={{fontSize:".6rem",fontWeight:700,color:T.primary}}>+{q.xp} XP</span>
                        <span style={{fontSize:".6rem",fontWeight:700,color:T.accentDark}}>+{q.minutes} Min</span>
                        {q.streak>0&&<span style={{fontSize:".6rem",fontWeight:700,color:"#F97316"}}>🔥{q.streak}</span>}
                      </div>
                    </div>
                    {pMode&&<button onClick={e=>{e.stopPropagation();rmQuest(q.id);}} style={{background:`${T.danger}15`,border:`1.5px solid ${T.danger}40`,borderRadius:8,padding:"3px 8px",color:T.danger,cursor:"pointer",fontSize:".6rem",fontWeight:800}}>✕</button>}
                  </button>;})}
                </div>
              </div>);
            })}

            {/* Parent panel */}
            {pMode&&<div style={{background:T.bg,borderRadius:20,padding:16,border:`2px solid ${T.primary}15`,marginTop:8}}>
              <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".8rem",color:T.primary,marginBottom:10,textTransform:"uppercase"}}>⚙️ Eltern</div>
              <button onClick={togVac} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"white",border:`2px solid ${state.vacMode?T.success:"rgba(0,0,0,0.06)"}`,borderRadius:14,padding:"10px 14px",cursor:"pointer",marginBottom:12,fontFamily:"'Nunito',sans-serif"}}>
                <span style={{fontWeight:700,fontSize:".8rem",color:state.vacMode?T.successDark:T.textPrimary}}>{state.vacMode?"🏖️ Ferienmodus":"📚 Schulmodus"}</span>
                <div style={{width:40,height:22,borderRadius:11,background:state.vacMode?T.success:"rgba(0,0,0,0.12)",position:"relative",transition:"all .3s"}}><div style={{width:16,height:16,borderRadius:8,background:"white",position:"absolute",top:3,left:state.vacMode?21:3,transition:"all .3s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/></div>
              </button>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <input ref={nqRef} value={nq.name} onChange={e=>setNq(n=>({...n,name:e.target.value}))} placeholder="Neue Quest..." style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:12,padding:"8px 12px",fontSize:".8rem",fontFamily:"'Nunito',sans-serif",outline:"none",fontWeight:600}}/>
                <div style={{display:"flex",gap:6}}>
                  <select value={nq.anchor} onChange={e=>setNq(n=>({...n,anchor:e.target.value}))} style={{flex:1,background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:10,padding:"6px",fontSize:".75rem"}}><option value="morning">🌅 Morgens</option><option value="afternoon">☀️ Nachmittags</option><option value="evening">🌙 Abends</option></select>
                  <input type="number" value={nq.xp} onChange={e=>setNq(n=>({...n,xp:+e.target.value}))} style={{width:50,background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:10,padding:"6px",fontSize:".75rem",textAlign:"center"}} placeholder="XP"/>
                  <input type="number" value={nq.minutes} onChange={e=>setNq(n=>({...n,minutes:+e.target.value}))} style={{width:50,background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:10,padding:"6px",fontSize:".75rem",textAlign:"center"}} placeholder="Min"/>
                </div>
                <button onClick={addQuest} style={{background:`linear-gradient(135deg,${T.primary},${T.primaryLight})`,border:"none",borderRadius:12,padding:"10px",color:"white",fontWeight:800,cursor:"pointer",fontSize:".8rem",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Erstellen</button>
              </div>
              {/* Parent Weekly Summary */}
              <div style={{background:"white",borderRadius:14,padding:12,marginTop:10,border:`2px solid ${T.primary}10`}}>
                <div style={{fontSize:".7rem",fontWeight:800,color:T.primary,textTransform:"uppercase",marginBottom:8}}>📊 Übersicht</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  <div style={{background:T.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.1rem",fontWeight:700,color:T.primary}}>{state.sd}</div>
                    <div style={{fontSize:".55rem",color:T.textSecondary,fontWeight:600}}>Tage-Streak</div>
                  </div>
                  <div style={{background:T.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.1rem",fontWeight:700,color:T.success}}>{state.hist.length}</div>
                    <div style={{fontSize:".55rem",color:T.textSecondary,fontWeight:600}}>Quests gesamt</div>
                  </div>
                  <div style={{background:T.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.1rem",fontWeight:700,color:T.accentDark}}>{(state.graduated||[]).length}</div>
                    <div style={{fontSize:".55rem",color:T.textSecondary,fontWeight:600}}>Graduiert 🎓</div>
                  </div>
                  <div style={{background:T.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.1rem",fontWeight:700,color:"#EC4899"}}>Lvl {level}</div>
                    <div style={{fontSize:".55rem",color:T.textSecondary,fontWeight:600}}>{state.xp} XP</div>
                  </div>
                </div>
                {(state.graduated||[]).length>0&&<div style={{marginTop:8,fontSize:".6rem",color:T.textSecondary}}>
                  <span style={{fontWeight:700}}>Graduierte Quests:</span> {(state.graduated||[]).map(gid=>{const q=[...SCHOOL_QUESTS,...VACATION_QUESTS].find(x=>x.id===gid);return q?q.name:gid;}).join(", ")}
                </div>}
                {state.moodAM!==null&&<div style={{marginTop:6,fontSize:".6rem",color:T.textSecondary}}>Stimmung heute: {MOOD_EMOJIS[state.moodAM]} morgens{state.moodPM!==null?`, ${MOOD_EMOJIS[state.moodPM]} abends`:""}</div>}
              </div>
              <div style={{display:"flex",gap:6,marginTop:10}}>
                <button onClick={resetDay} style={{flex:1,background:`${T.accent}20`,border:`1.5px solid ${T.accent}`,borderRadius:10,padding:"8px",color:T.accentDark,cursor:"pointer",fontSize:".7rem",fontWeight:800}}>🔄 Tag</button>
                <button onClick={resetAll} style={{flex:1,background:`${T.danger}15`,border:`1.5px solid ${T.danger}`,borderRadius:10,padding:"8px",color:T.danger,cursor:"pointer",fontSize:".7rem",fontWeight:800}}>🗑️ Alles</button>
              </div>
            </div>}
          </div>
        </div>}

        {/* ═══ TIME BANK ═══ */}
        {view==="time"&&<div style={{minHeight:"100vh",padding:"env(safe-area-inset-top, 12px) 20px 100px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,paddingTop:8}}>
            <button onClick={()=>setView("hub")} style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"8px 16px",cursor:"pointer",fontWeight:800,fontSize:".8rem"}}>← Zurück</button>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,color:T.primary,textTransform:"uppercase",fontStyle:"italic"}}>Zeitbank</div>
            <div style={{width:80}}/>
          </div>
          <div style={{background:`linear-gradient(135deg, ${T.primary}12, ${T.success}10)`,borderRadius:24,padding:28,textAlign:"center",marginBottom:24,border:`2px solid ${T.primary}15`}}>
            <div style={{fontSize:".75rem",color:T.textSecondary,fontWeight:600,marginBottom:4}}>Heute verdient</div>
            <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"3rem",fontWeight:700,color:T.success}}>{state.dt} <span style={{fontSize:"1rem",color:T.textSecondary}}>Min</span></div>
            <div style={{fontSize:".7rem",color:T.primaryLight,fontWeight:700,marginTop:4}}>{allDone?"🎉 Alle Quests erledigt!":`${total-done} Quests übrig`}</div>
          </div>
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".75rem",color:T.textSecondary,textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Belohnungen</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {state.rewards.map(r=>{const can=state.dt>=r.minutes;return(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:14,background:"white",border:can?`2px solid ${T.success}30`:"2px solid rgba(0,0,0,0.04)",borderRadius:18,padding:"14px 16px",opacity:can?1:.45,boxShadow:can?`0 4px 16px ${T.success}15`:"0 2px 8px rgba(0,0,0,0.03)"}}>
                <div style={{width:48,height:48,borderRadius:14,background:can?`${T.success}15`:T.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem"}}>{r.icon}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:".9rem"}}>{r.name}</div><div style={{fontSize:".65rem",color:T.textSecondary,fontWeight:600}}>{r.minutes} Minuten</div></div>
                <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:".8rem",fontWeight:700,color:can?T.success:T.textLight}}>{can?"✓ Frei":"🔒"}</div>
              </div>);})}
          </div>
        </div>}

        {/* ═══ ACHIEVEMENTS ═══ */}
        {view==="stats"&&<div style={{minHeight:"100vh",padding:"env(safe-area-inset-top, 12px) 20px 100px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,paddingTop:8}}>
            <button onClick={()=>setView("hub")} style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"8px 16px",cursor:"pointer",fontWeight:800,fontSize:".8rem"}}>← Zurück</button>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,color:T.primary,textTransform:"uppercase",fontStyle:"italic"}}>Erfolge</div>
            <div style={{width:80}}/>
          </div>
          <div style={{background:"white",borderRadius:20,padding:20,display:"flex",alignItems:"center",gap:16,marginBottom:24,boxShadow:"0 4px 20px rgba(0,0,0,0.06)",border:"2px solid rgba(0,0,0,0.04)"}}>
            <HeroSprite shape={state.hero.shape} color={state.hero.color} eyes={state.hero.eyes} hair={state.hero.hair} size={72} level={level}/>
            <div>
              <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:"1rem"}}>{state.hero.name}</div>
              <div style={{fontSize:".7rem",color:T.textSecondary,fontWeight:600}}>Level {level} Held</div>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <span style={{fontSize:".65rem",fontWeight:700,color:T.primary}}>⚡{state.xp}</span>
                <span style={{fontSize:".65rem",fontWeight:700,color:T.accentDark}}>🪙{state.coins}</span>
                <span style={{fontSize:".65rem",fontWeight:700,color:"#F97316"}}>🔥{state.sd}d</span>
              </div>
            </div>
          </div>
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".75rem",color:T.textSecondary,textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Badges</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:24}}>
            {BADGES.map((b,i)=><div key={i} style={{background:b.u?"white":T.bg,border:b.u?`2px solid ${T.primary}30`:"2px solid rgba(0,0,0,0.04)",borderRadius:16,padding:"14px 8px",textAlign:"center",opacity:b.u?1:.35,boxShadow:b.u?`0 4px 12px ${T.primary}10`:"none"}}>
              <div style={{fontSize:"1.8rem",marginBottom:4}}>{b.i}</div>
              <div style={{fontSize:".65rem",fontWeight:800,color:b.u?T.primary:T.textLight}}>{b.n}</div>
            </div>)}
          </div>
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".75rem",color:T.textSecondary,textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Stats</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[{l:"Gesamt XP",v:state.xp,i:"⚡"},{l:"Münzen",v:state.coins,i:"🪙"},{l:"Quests",v:state.hist.length,i:"⚔️"},{l:"Streak",v:state.sd+"d",i:"🔥"},{l:"Level",v:level,i:"📈"}].map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"white",borderRadius:14,padding:"12px 16px",border:"2px solid rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:"1.1rem"}}>{s.i}</span><span style={{fontSize:".8rem",fontWeight:700}}>{s.l}</span></div>
              <span style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1rem",fontWeight:700,color:T.primary}}>{s.v}</span>
            </div>)}
          </div>
        </div>}

        {/* ═══ ROOM ═══ */}
        {view==="room"&&<div style={{minHeight:"100vh",padding:"env(safe-area-inset-top, 12px) 0 100px",background:"linear-gradient(180deg, #DBEAFE 0%, #BFDBFE 40%, #93C5FD 100%)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 20px 12px"}}>
            <button onClick={()=>{SFX.play("tap");setView("hub");}} style={{background:"rgba(255,255,255,0.8)",border:"none",borderRadius:50,padding:"8px 16px",cursor:"pointer",fontWeight:800,fontSize:".8rem",backdropFilter:"blur(8px)"}}>← Zurück</button>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,color:"white",textTransform:"uppercase",fontStyle:"italic",textShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>{state.hero.name}'s Zimmer</div>
            <div style={{width:80}}/>
          </div>
          {/* Room Scene */}
          <div style={{position:"relative",margin:"0 12px",height:380,borderRadius:24,overflow:"hidden",background:"linear-gradient(180deg, #FEF3C7 0%, #FDE68A 100%)",border:"3px solid rgba(255,255,255,0.4)",boxShadow:"0 12px 40px rgba(0,0,0,0.12)"}}>
            {/* Wall */}
            <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg, #FFF8F0 0%, #FEF3C7 60%, #D4A574 60%, #C9956A 100%)"}}/>
            {/* Window */}
            <div style={{position:"absolute",top:30,right:30,width:80,height:80,borderRadius:16,background:"linear-gradient(180deg, #7DD3FC, #38BDF8)",border:"6px solid #D4A574",boxShadow:"inset 0 0 20px rgba(255,255,255,0.3)"}}>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:3,background:"#D4A574"}}/><div style={{position:"absolute",left:"50%",top:0,bottom:0,width:3,background:"#D4A574"}}/>
            </div>
            {/* Shelf */}
            <div style={{position:"absolute",top:40,left:20,width:100,height:8,borderRadius:4,background:"#92400E",boxShadow:"0 4px 8px rgba(0,0,0,0.1)"}}>
              {(state.purchased||[]).includes("rm_trophy")&&<div style={{position:"absolute",bottom:8,left:35,fontSize:"1.5rem"}}>🏆</div>}
            </div>
            {/* Poster */}
            {(state.purchased||[]).includes("rm_poster")&&<div style={{position:"absolute",top:25,left:140,width:50,height:60,borderRadius:8,background:"linear-gradient(135deg, #EC4899, #8B5CF6)",border:"3px solid #92400E",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem"}}>⭐</div>}
            {/* Plant */}
            {(state.purchased||[]).includes("rm_plant")&&<div style={{position:"absolute",bottom:"42%",right:20,fontSize:"2rem"}}>🪴</div>}
            {/* Lava lamp */}
            {(state.purchased||[]).includes("rm_lamp")&&<div style={{position:"absolute",bottom:"42%",left:20,fontSize:"2rem"}}>🪔</div>}
            {/* Rug */}
            {(state.purchased||[]).includes("rm_rug")&&<div style={{position:"absolute",bottom:"6%",left:"25%",width:"50%",height:24,borderRadius:12,background:"linear-gradient(90deg, #8B5CF6, #EC4899, #8B5CF6)",opacity:0.6}}/>}
            {/* Hero + Cat on floor */}
            <div style={{position:"absolute",bottom:"12%",left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"flex-end",gap:6}}>
              <div style={{animation:"heroFloat 3s ease-in-out infinite"}}><HeroSprite shape={state.hero.shape} color={state.hero.color} eyes={state.hero.eyes} hair={state.hero.hair} size={100} level={level}/></div>
              <div style={{animation:"catIdle 4s ease-in-out infinite"}}><CatSidekick variant={state.catVariant} mood={mood} size={44}/></div>
            </div>
          </div>
          {/* Room items count */}
          <div style={{padding:"16px 20px",textAlign:"center"}}>
            <div style={{fontSize:".75rem",color:"white",fontWeight:700,textShadow:"0 1px 4px rgba(0,0,0,0.2)"}}>
              {(state.purchased||[]).filter(id=>id.startsWith("rm_")).length} / {SHOP_ITEMS.room.length} Zimmer-Items
            </div>
            <button onClick={()=>{SFX.play("tap");setView("shop");setShopTab("room");}} style={{marginTop:8,background:"rgba(255,255,255,0.9)",border:"none",borderRadius:50,padding:"10px 24px",fontWeight:800,fontSize:".8rem",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",color:T.primary,boxShadow:"0 4px 16px rgba(0,0,0,0.1)"}}>🛍️ Zimmer dekorieren</button>
          </div>
        </div>}

        {/* ═══ SHOP ═══ */}
        {view==="shop"&&<div style={{minHeight:"100vh",padding:"env(safe-area-inset-top, 12px) 20px 100px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,paddingTop:8}}>
            <button onClick={()=>setView("hub")} style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"8px 16px",cursor:"pointer",fontWeight:800,fontSize:".8rem"}}>← Zurück</button>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,color:T.primary,textTransform:"uppercase",fontStyle:"italic"}}>Shop</div>
            <div style={{background:`${T.accent}30`,borderRadius:50,padding:"4px 12px",fontSize:".8rem",fontWeight:800,color:T.accentDark}}>🪙 {state.coins}</div>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",gap:6,marginBottom:20}}>
            {[{id:"hero",l:"Held",i:"🦸"},{id:"cat",l:"Katze",i:"🐱"},{id:"room",l:"Zimmer",i:"🏠"}].map(t=><button key={t.id} onClick={()=>setShopTab(t.id)} style={{flex:1,background:shopTab===t.id?`${T.primary}12`:"white",border:shopTab===t.id?`2px solid ${T.primary}30`:"2px solid rgba(0,0,0,0.06)",borderRadius:14,padding:"10px 8px",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:".72rem",color:shopTab===t.id?T.primary:T.textSecondary,textTransform:"uppercase",textAlign:"center"}}>{t.i}<br/>{t.l}</button>)}
          </div>
          {/* Items */}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {(SHOP_ITEMS[shopTab]||[]).map(item=>{
              const owned=(state.purchased||[]).includes(item.id);
              const canBuy=state.coins>=item.cost&&!owned;
              return <div key={item.id} style={{display:"flex",alignItems:"center",gap:14,background:"white",border:owned?`2px solid ${T.success}30`:"2px solid rgba(0,0,0,0.04)",borderRadius:18,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.03)"}}>
                <div style={{width:48,height:48,borderRadius:14,background:owned?`${T.success}15`:`${T.primary}08`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem"}}>{item.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:".9rem"}}>{item.name}</div>
                  <div style={{fontSize:".65rem",color:T.accentDark,fontWeight:700}}>🪙 {item.cost}</div>
                </div>
                <button onClick={()=>canBuy&&buyItem(item.id,item.cost)} disabled={!canBuy&&!owned} style={{
                  background:owned?`${T.success}15`:canBuy?`linear-gradient(135deg,${T.primary},${T.primaryLight})`:"rgba(0,0,0,0.04)",
                  border:"none",borderRadius:50,padding:"8px 18px",
                  color:owned?T.successDark:canBuy?"white":T.textLight,
                  fontWeight:800,fontSize:".75rem",cursor:canBuy?"pointer":"default",
                  fontFamily:"'Plus Jakarta Sans',sans-serif",
                  opacity:!owned&&!canBuy?.4:1,
                  boxShadow:canBuy?`0 4px 12px ${T.primary}30`:"none",
                }}>{owned?"Gekauft ✓":"Kaufen"}</button>
              </div>;
            })}
          </div>
          {(SHOP_ITEMS[shopTab]||[]).length>0&&<div style={{fontSize:".65rem",color:T.textLight,textAlign:"center",marginTop:16}}>
            {shopTab==="room"?"Zimmer-Items werden bald sichtbar in deinem Raum! 🏠":shopTab==="hero"?"Held-Items erscheinen auf deinem Charakter! 🦸":"Katzen-Items erscheinen auf deinem Sidekick! 🐱"}
          </div>}
        </div>}

        {/* ═══ JOURNAL ═══ */}
        {view==="journal"&&<div style={{minHeight:"100vh",padding:"env(safe-area-inset-top, 12px) 20px 100px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,paddingTop:8}}>
            <button onClick={()=>setView("hub")} style={{background:"white",border:"2px solid rgba(0,0,0,0.06)",borderRadius:50,padding:"8px 16px",cursor:"pointer",fontWeight:800,fontSize:".8rem"}}>← Zurück</button>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"1rem",fontWeight:800,color:T.primary,textTransform:"uppercase",fontStyle:"italic"}}>Tagebuch</div>
            <div style={{width:80}}/>
          </div>

          {/* Today's date */}
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.2rem",fontWeight:700,color:T.textPrimary}}>{new Date().toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>

          {/* Mood summary */}
          <div style={{display:"flex",gap:10,marginBottom:20}}>
            <div style={{flex:1,background:"white",borderRadius:16,padding:14,border:"2px solid rgba(0,0,0,0.04)",textAlign:"center"}}>
              <div style={{fontSize:".65rem",fontWeight:800,color:T.textSecondary,textTransform:"uppercase",marginBottom:6}}>🌅 Morgens</div>
              <div style={{fontSize:"2rem"}}>{state.moodAM!==null?MOOD_EMOJIS[state.moodAM]:"—"}</div>
            </div>
            <div style={{flex:1,background:"white",borderRadius:16,padding:14,border:"2px solid rgba(0,0,0,0.04)",textAlign:"center"}}>
              <div style={{fontSize:".65rem",fontWeight:800,color:T.textSecondary,textTransform:"uppercase",marginBottom:6}}>🌙 Abends</div>
              <div style={{fontSize:"2rem"}}>{state.moodPM!==null?MOOD_EMOJIS[state.moodPM]:"—"}</div>
              {state.moodPM===null&&<div style={{display:"flex",justifyContent:"center",gap:2,marginTop:6}}>{MOOD_EMOJIS.map((e,i)=><button key={i} onClick={()=>setMood("moodPM",i)} style={{fontSize:"1.2rem",background:"none",border:"none",cursor:"pointer",padding:"2px"}}>{e}</button>)}</div>}
            </div>
          </div>

          {/* Rainbow summary */}
          <div style={{background:"white",borderRadius:16,padding:14,marginBottom:20,border:"2px solid rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:".7rem",fontWeight:800,color:T.textSecondary,textTransform:"uppercase",marginBottom:8}}>🌈 Regenbogen heute</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>{RAINBOW.map((e,i)=>{
              const done=(state.rainbow||[])[i];
              return <div key={i} style={{textAlign:"center"}}>
                <div style={{fontSize:"1.4rem",opacity:done?1:0.25}}>{e}</div>
                <div style={{fontSize:".5rem",fontWeight:700,color:done?T.successDark:T.textLight,marginTop:2}}>{done?"✓":RAINBOW_LABELS[i]}</div>
              </div>;
            })}</div>
            {(state.rainbow||[]).every(Boolean)&&<div style={{textAlign:"center",fontSize:".7rem",fontWeight:800,color:T.success,marginTop:8}}>🎉 Alle Farben geschafft! +25 XP</div>}
          </div>

          {/* Guided Journal */}
          {[
            {id:"best",q:"Was war heute das Beste?",opts:[
              {v:"school",l:"🏫 Schule"},{v:"friends",l:"👫 Freunde"},{v:"sport",l:"⚽ Sport"},
              {v:"family",l:"👨‍👩‍👦 Familie"},{v:"play",l:"🎮 Spielen"},{v:"food",l:"🍕 Essen"},{v:"learn",l:"📚 Gelernt"},
            ]},
            {id:"proud",q:"Worauf bist du stolz?",opts:[
              {v:"quests",l:"✅ Alle Quests"},{v:"helped",l:"🤝 Geholfen"},{v:"hard",l:"💪 Was Schwieriges"},
              {v:"brave",l:"🦁 Mutig"},{v:"patient",l:"🧘 Geduldig"},{v:"new",l:"🌟 Was Neues"},
            ]},
            {id:"school",q:"Wie war die Schule?",opts:[
              {v:"super",l:"🤩 Super"},{v:"good",l:"😊 Gut"},{v:"ok",l:"😐 Ok"},{v:"meh",l:"😕 Naja"},
            ]},
            {id:"tomorrow",q:"Was nimmst du dir morgen vor?",opts:[
              {v:"read",l:"📖 Mehr lesen"},{v:"move",l:"🏃 Mehr bewegen"},{v:"friends",l:"👫 Freunde treffen"},
              {v:"try",l:"🌟 Was Neues"},{v:"create",l:"🎨 Kreativ sein"},{v:"kind",l:"💛 Nett sein"},
            ]},
          ].map(q=>{
            const ans=(state.jAnswers||{})[q.id];
            return <div key={q.id} style={{background:"white",borderRadius:18,padding:14,marginBottom:12,border:"2px solid rgba(0,0,0,0.04)",boxShadow:"0 2px 8px rgba(0,0,0,0.03)"}}>
              <div style={{fontSize:".75rem",fontWeight:800,color:T.textSecondary,textTransform:"uppercase",marginBottom:10}}>{q.q}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {q.opts.map(o=><button key={o.v} onClick={()=>setJAnswer(q.id,o.v)} style={{
                  background:ans===o.v?`${T.primary}12`:"rgba(0,0,0,0.02)",
                  border:ans===o.v?`2px solid ${T.primary}40`:"2px solid rgba(0,0,0,0.05)",
                  borderRadius:50,padding:"6px 14px",cursor:"pointer",
                  fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:".75rem",
                  color:ans===o.v?T.primary:T.textPrimary,
                  transition:"all .15s",
                }}>{o.l}</button>)}
              </div>
            </div>;
          })}

          {/* Free text */}
          <div style={{background:"white",borderRadius:18,padding:14,border:"2px solid rgba(0,0,0,0.04)",boxShadow:"0 2px 8px rgba(0,0,0,0.03)"}}>
            <div style={{fontSize:".75rem",fontWeight:800,color:T.textSecondary,textTransform:"uppercase",marginBottom:10}}>✏️ Noch etwas? (Optional)</div>
            <textarea
              ref={journalRef}
              value={state.journal||""}
              onChange={e=>setJournal(e.target.value)}
              placeholder="Was dich bewegt, was passiert ist, ein Highlight..."
              style={{
                width:"100%",minHeight:100,background:T.bg,border:"2px solid rgba(0,0,0,0.06)",
                borderRadius:14,padding:"12px 14px",color:T.textPrimary,fontSize:".85rem",
                fontFamily:"'Nunito',sans-serif",outline:"none",fontWeight:600,resize:"vertical",
                lineHeight:1.6,
              }}
            />
          </div>

          {/* Stats for today */}
          <div style={{background:`${T.primary}08`,borderRadius:16,padding:14,marginTop:16,border:`2px solid ${T.primary}10`}}>
            <div style={{fontSize:".7rem",fontWeight:800,color:T.primary,textTransform:"uppercase",marginBottom:8}}>📊 Heute</div>
            <div style={{display:"flex",justifyContent:"space-around",textAlign:"center"}}>
              <div><div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.2rem",fontWeight:700,color:T.primary}}>{done}/{total}</div><div style={{fontSize:".55rem",color:T.textSecondary}}>Quests</div></div>
              <div><div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.2rem",fontWeight:700,color:T.accentDark}}>+{state.dt}min</div><div style={{fontSize:".55rem",color:T.textSecondary}}>Verdient</div></div>
              <div><div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"1.2rem",fontWeight:700,color:T.success}}>{(state.rainbow||[]).filter(Boolean).length}/6</div><div style={{fontSize:".55rem",color:T.textSecondary}}>Farben</div></div>
            </div>
          </div>
        </div>}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(HeroDex));
</script>
</body>
</html>
