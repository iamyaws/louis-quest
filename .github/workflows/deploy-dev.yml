name: Deploy Dev to GitHub Pages

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Build with /Ronki/dev/ base path
        run: npx vite build --base /Ronki/dev/ --outDir dist-dev

      - name: Patch manifest & SW for /dev/ path
        run: |
          sed -i 's|"/Ronki/"|"/Ronki/dev/"|g' dist-dev/manifest.json
          sed -i 's|/Ronki/|/Ronki/dev/|g' dist-dev/sw.js

      - name: Deploy to gh-pages /dev/ subfolder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-dev
          destination_dir: dev
          keep_files: true
